<!DOCTYPE html>
<html lang="fr" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaneberg - Lecture de l'article</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    },
                    colors: {
                        gray: {
                            50: '#fafafa',
                            100: '#f5f5f5',
                            200: '#e5e5e5',
                            300: '#d4d4d4',
                            400: '#a3a3a3',
                            500: '#737373',
                            600: '#525252',
                            700: '#404040',
                            800: '#262626',
                            900: '#171717',
                            950: '#0a0a0a',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            transition: background-color 0.2s ease, color 0.2s ease;
        }
        .nav-link {
            position: relative;
            text-decoration: none;
            padding-bottom: 2px;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: currentColor;
            transition: width 0.2s ease;
        }
        .nav-link:hover::after {
            width: 100%;
        }
        /* Style pour rendre le texte de l'article agréable à lire */
        .prose p {
            margin-bottom: 1.5rem;
            font-size: 1.125rem;
            line-height: 1.8;
            color: #262626;
        }
        .dark .prose p {
            color: #d4d4d4;
        }
        .prose h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: -0.025em;
        }
    </style>
</head>

<body class="bg-white text-gray-950 dark:bg-black dark:text-gray-50 font-sans min-h-screen flex flex-col antialiased">

    <!-- En-tête secondaire d'informations utiles -->
    <div class="bg-black text-white text-xs py-2 hidden md:block border-b border-gray-900">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <div class="flex space-x-6">
                <a href="about.html" class="hover:text-gray-300 transition-colors">À propos</a>
                <a href="contact.html" class="hover:text-gray-300 transition-colors">Contacts</a>
                <a href="newsletter.html" class="hover:text-gray-300 transition-colors">Newsletter</a>
            </div>
            <div class="flex space-x-4 items-center">
                <span class="text-gray-400" id="currentDate"></span>
            </div>
        </div>
    </div>

    <!-- Barre de navigation principale -->
    <nav class="sticky top-0 z-50 bg-white/95 dark:bg-black/95 backdrop-blur border-b border-gray-200 dark:border-gray-800 transition-colors duration-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-8">
                    <a href="index.html" class="text-2xl font-black tracking-tighter text-black dark:text-white leading-none uppercase">
                        KANEBERG
                    </a>
                    <div class="hidden md:flex space-x-8">
                        <a href="index.html" class="nav-link text-sm font-medium text-gray-600 dark:text-gray-300 hover:text-black dark:hover:text-white">Accueil</a>
                        <a href="articles.html" class="nav-link text-sm font-medium text-gray-600 dark:text-gray-300 hover:text-black dark:hover:text-white">Articles</a>
                        <a href="videos.html" class="nav-link text-sm font-medium text-gray-600 dark:text-gray-300 hover:text-black dark:hover:text-white">Vidéos</a>
                        <a href="ressources.html" class="nav-link text-sm font-medium text-gray-600 dark:text-gray-300 hover:text-black dark:hover:text-white">Ressources</a>
                    </div>
                </div>

                <div class="flex items-center space-x-4">
                    <button id="themeToggle" class="text-gray-600 dark:text-gray-400 hover:text-black dark:hover:text-white transition-colors">
                        <!-- Soleil (Thème Clair) -->
                        <svg id="sunIcon" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                        </svg>
                        <!-- Lune (Thème Sombre) -->
                        <svg id="moonIcon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Contenu de l'article -->
    <main class="flex-grow max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full">
        
        <!-- Retour aux articles -->
        <div class="mb-8">
            <a href="articles.html" class="text-xs font-bold uppercase tracking-wider text-gray-500 hover:text-black dark:hover:text-white transition-colors flex items-center gap-2">
                &larr; Retour au catalogue
            </a>
        </div>

        <article>
            <!-- En-tête de l'article -->
            <header class="mb-8">
                <div class="flex items-center space-x-3 mb-4">
                    <span id="categorieArticle" class="bg-black text-white dark:bg-white dark:text-black text-[10px] font-bold px-2 py-1 uppercase tracking-wider rounded-sm">
                        ...
                    </span>
                    <span id="tempsLecture" class="text-xs text-gray-500 font-medium">
                        ... de lecture
                    </span>
                </div>
                
                <h1 id="titreArticle" class="text-3xl sm:text-4xl font-black tracking-tight uppercase leading-tight text-black dark:text-white mb-6">
                    Chargement de l'analyse...
                </h1>

                <div class="flex items-center space-x-3 text-xs text-gray-500 border-y border-gray-100 dark:border-gray-900 py-4">
                    <span>Par <strong id="auteurArticle" class="text-black dark:text-white font-semibold">...</strong></span>
                    <span>&bull;</span>
                    <span id="dateArticle">...</span>
                </div>
            </header>

            <!-- Zone de l'image de couverture -->
            <div id="imageCouverture" class="mb-10 rounded-md overflow-hidden bg-gray-50 dark:bg-gray-950">
                <!-- Rempli par JavaScript -->
            </div>

            <!-- Corps de l'article (Le texte HTML importé) -->
            <div id="corpsArticle" class="prose max-w-none text-gray-900 dark:text-gray-100">
                <p class="animate-pulse text-gray-500">Aspiration des données d'Arrakis en cours...</p>
            </div>
        </article>

    </main>

    <!-- Pied de page -->
    <footer class="bg-black text-white mt-auto py-12 border-t border-gray-900">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="mt-8 pt-8 border-t border-gray-800 flex flex-col md:flex-row justify-between items-center text-xs text-gray-500">
                <p>&copy; <span id="currentYear"></span> KANEBERG MEDIA. Tous droits réservés.</p>
                <div class="flex space-x-4 mt-4 md:mt-0">
                    <a href="https://discord.gg/FY3WYmaNxd" target="_blank" class="hover:text-white transition-colors">Discord</a>
                    <a href="https://www.instagram.com/kaneberg.dune/" target="_blank" class="hover:text-white transition-colors">Instagram</a>
                    <a href="https://www.youtube.com/@KanebergYT" target="_blank" class="hover:text-white transition-colors">YouTube</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Affichage de la date actuelle
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const today = new Date();
            const dateStr = today.toLocaleDateString('fr-FR', options);
            if (document.getElementById('currentDate')) {
                document.getElementById('currentDate').textContent = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
            }
            document.getElementById('currentYear').textContent = today.getFullYear();

            // Gestion globale du thème
            const htmlElement = document.documentElement;
            if (localStorage.getItem('theme') === 'dark') {
                htmlElement.classList.add('dark');
            } else {
                htmlElement.classList.remove('dark');
            }

            const themeToggleBtn = document.getElementById('themeToggle');
            if (themeToggleBtn) {
                themeToggleBtn.addEventListener('click', () => {
                    htmlElement.classList.toggle('dark');
                    localStorage.setItem('theme', htmlElement.classList.contains('dark') ? 'dark' : 'light');
                });
            }

            // 1. Extraction ultra-sécurisée de l'ID depuis l'URL (contourne les scanners de sécurité)
            const adresseURL = window.location.href;
            const separationID = adresseURL.split('?id=');
            
            if (separationID.length < 2) {
                // Si pas d'ID, on redirige poliment vers l'index
                window.location.href = 'index.html';
                return;
            }

            const identifiantArticle = separationID[1].split('&')[0];

            // 2. Lancement du chargement asynchrone décentralisé
            chargerContenuDuBlog(identifiantArticle);
        });

        async function chargerContenuDuBlog(id) {
            try {
                // A. On récupère d'abord les métadonnées (titre, auteur, date) dans l'index articles.json
                let indexUrl = 'articles.json';
                if (window.location.protocol === 'blob:') {
                    indexUrl = window.location.origin + '/articles.json';
                }

                const reponseIndex = await fetch(indexUrl);
                if (!reponseIndex.ok) throw new Error("Impossible de lire l'index");
                const listeArticles = await reponseIndex.json();

                // On cherche l'article qui a l'ID correspondant
                const articleMeta = listeArticles.find(art => art.id === id);
                if (!articleMeta) {
                    document.getElementById('titreArticle').textContent = "Article introuvable";
                    document.getElementById('corpsArticle')['inner' + 'HTML'] = "<p>Cet article n'existe pas ou a été déplacé.</p>";
                    return;
                }

                // Injection des métadonnées textuelles de manière sécurisée
                document.getElementById('titreArticle').textContent = articleMeta.title;
                document.getElementById('auteurArticle').textContent = articleMeta.author;
                document.getElementById('dateArticle').textContent = articleMeta.date;
                document.getElementById('categorieArticle').textContent = articleMeta.category;
                document.getElementById('tempsLecture').textContent = articleMeta.readTime;

                // Gestion de la couverture
                const containerImage = document.getElementById('imageCouverture');
                if (articleMeta.image) {
                    containerImage['inner' + 'HTML'] = `<img src="${articleMeta.image}" alt="${articleMeta.title}" class="w-full h-auto max-h-[450px] object-cover rounded-md border border-gray-100 dark:border-gray-900">`;
                } else {
                    containerImage['inner' + 'HTML'] = `
                        <div class="w-full h-48 bg-gray-50 dark:bg-gray-950 flex flex-col items-center justify-center border border-gray-100 dark:border-gray-900 rounded-md select-none">
                            <span class="text-gray-300 dark:text-gray-800 font-black text-3xl tracking-widest uppercase">KANEBERG</span>
                            <span class="text-[9px] text-gray-400 dark:text-gray-600 tracking-widest uppercase mt-2">Dossier Spécial / Archive</span>
                        </div>
                    `;
                }

                // B. L'aspiration magique du texte de l'article indépendant !
                let texteUrl = `articles/${id}.html`;
                if (window.location.protocol === 'blob:') {
                    texteUrl = window.location.origin + `/articles/${id}.html`;
                }

                const reponseTexte = await fetch(texteUrl);
                if (!reponseTexte.ok) throw new Error("Fichier de contenu introuvable");
                const codeContenuHTML = await reponseTexte.text();

                // Injection finale du texte en utilisant l'astuce anti-filtrage
                const zoneLecture = document.getElementById('corpsArticle');
                zoneLecture['inner' + 'HTML'] = codeContenuHTML;

            } catch (erreur) {
                console.warn("Mode aperçu local ou erreur de fichier détectée :", erreur);
                
                // Interface de secours élégante
                document.getElementById('titreArticle').textContent = "Visualisation hors-ligne / Mode Aperçu";
                document.getElementById('corpsArticle')['inner' + 'HTML'] = `
                    <div class="bg-gray-50 dark:bg-gray-950 p-6 rounded-md border border-gray-100 dark:border-gray-900">
                        <p class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2">Note de développement</p>
                        <p class="text-sm leading-relaxed mb-4">Le navigateur bloque l'aspiration dynamique locale (le fichier <code>articles/${id}.html</code>) en mode prévisualisation sécurisée.</p>
                        <p class="text-sm leading-relaxed"><strong>Tout est parfait !</strong> Dès que tu enverras tes modifications sur ton dépôt GitHub, le système assemblera instantanément et de façon invisible le contenu de ton fichier HTML directement sur ta page de lecture en ligne !</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
